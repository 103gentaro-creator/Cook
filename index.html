<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷蔵庫の残り物レシピ提案（分量付き）</title>
    <style>
        /* 全体のリセットと基本スタイル */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #e67e22;
        }
        p.subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
        }

        /* 入力エリアのスタイル */
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #e67e22;
        }

        /* ボタンのスタイル */
        button {
            width: 100%;
            background-color: #e67e22;
            color: #fff;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #d35400;
        }

        /* 結果表示エリア */
        .result-section {
            margin-top: 30px;
        }
        .result-title {
            font-size: 1.2rem;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .recipe-card {
            background: #fff;
            border: 1px solid #eee;
            border-left: 5px solid #e67e22;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .recipe-name {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .recipe-ingredients-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 5px;
        }
        .recipe-ingredients-list {
            font-size: 0.9rem;
            color: #555;
            background-color: #fff8f2;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            list-style: none;
        }
        .recipe-ingredients-list li {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #f5d6bc;
            padding: 4px 0;
        }
        .recipe-ingredients-list li:last-child {
            border-bottom: none;
        }
        .recipe-steps-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .recipe-steps {
            font-size: 0.9rem;
            color: #555;
            padding-left: 20px;
        }
        .recipe-steps li {
            margin-bottom: 6px;
        }
        .no-result {
            text-align: center;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍳 残り物レシピ提案アプリ</h1>
    <p class="subtitle">冷蔵庫にある食材をカンマ（、）かスペースで区切って入力してください。</p>

    <div class="input-group">
        <label for="ingredientsInput">食材を入力</label>
        <input type="text" id="ingredientsInput" placeholder="例: 豚肉, キャベツ, 玉ねぎ">
    </div>

    <button onclick="suggestRecipes()">レシピを検索する</button>

    <div class="result-section" id="resultSection" style="display: none;">
        <h2 class="result-title">おすすめのレシピ</h2>
        <div id="recipeList"></div>
    </div>
</div>

<script>
    // 1. レシピのデータベース（分量付き・2人分目安）
    const recipeDatabase = [
        {
            name: "豚肉とキャベツの味噌炒め",
            keywords: ["豚肉", "キャベツ"],
            ingredients: [
                { name: "豚バラ肉", amount: "150g" },
                { name: "キャベツ", amount: "1/4玉" },
                { name: "味噌", amount: "大さじ1" },
                { name: "みりん", amount: "大さじ1" },
                { name: "醤油", amount: "小さじ1" },
                { name: "すりおろし生姜", amount: "小さじ1/2" }
            ],
            steps: [
                "豚肉を一口大に切り、フライパンで炒めます。",
                "肉の色が変わったら、ざく切りにしたキャベツを加えます。",
                "キャベツが少ししんなりしたら、混ぜ合わせた調味料（味噌・みりん・醤油・生姜）を入れて全体に手早く絡めます。"
            ]
        },
        {
            name: "具だくさん野菜炒め",
            keywords: ["キャベツ", "玉ねぎ", "人参", "もやし", "豚肉"],
            ingredients: [
                { name: "豚こま肉", amount: "100g" },
                { name: "キャベツ", amount: "2枚" },
                { name: "玉ねぎ", amount: "1/4個" },
                { name: "人参やもやしなど", amount: "適量" },
                { name: "塩コショウ", amount: "少々" },
                { name: "醤油", amount: "小さじ1" },
                { name: "ごま油", amount: "大さじ1" }
            ],
            steps: [
                "野菜と肉を食べやすい大きさに切ります。",
                "フライパンにごま油を熱し、火の通りにくい人参や肉から順に炒めます。",
                "全体に火が通ったら、塩コショウと醤油を回し入れてサッと炒め合わせます。"
            ]
        },
        {
            name: "定番の肉じゃが",
            keywords: ["豚肉", "牛肉", "玉ねぎ", "じゃがいも", "人参"],
            ingredients: [
                { name: "豚肉（または牛肉）", amount: "150g" },
                { name: "じゃがいも", amount: "2〜3個" },
                { name: "玉ねぎ", amount: "1/2個" },
                { name: "人参", amount: "1/2本" },
                { name: "だし汁", amount: "200ml" },
                { name: "醤油・砂糖・みりん", amount: "各大さじ2" }
            ],
            steps: [
                "鍋に油（分量外）を熱し、一口大に切ったお肉と野菜を炒めます。",
                "全体に油が回ったらだし汁を加え、煮立ったらアクを取ります。",
                "調味料をすべて加え、落とし蓋をして弱火で野菜が柔らかくなるまで（約15分）煮込みます。"
            ]
        },
        {
            name: "オニオンスープ",
            keywords: ["玉ねぎ"],
            ingredients: [
                { name: "玉ねぎ", amount: "1個" },
                { name: "バター", amount: "10g" },
                { name: "水", amount: "400ml" },
                { name: "コンソメキューブ", amount: "1個" },
                { name: "塩コショウ", amount: "少々" }
            ],
            steps: [
                "玉ねぎを薄切りにします。",
                "鍋にバターを熱し、玉ねぎがきつね色（飴色）になるまで弱火〜中火でじっくり炒めます。",
                "水とコンソメを加え、沸騰したら弱火で10分ほど煮込み、最後に塩コショウで味を調えます。"
            ]
        },
        {
            name: "簡単ミニオムレツ",
            keywords: ["卵", "玉ねぎ", "チーズ"],
            ingredients: [
                { name: "卵", amount: "2個" },
                { name: "玉ねぎ", amount: "1/4個" },
                { name: "ピザ用チーズ", amount: "ひとつかみ" },
                { name: "バター", amount: "5g" },
                { name: "塩コショウ", amount: "少々" }
            ],
            steps: [
                "玉ねぎをみじん切りにし、フライパンでしんなりするまで炒めて一度取り出します。",
                "ボウルに卵を割り入れ、炒めた玉ねぎ、チーズ、塩コショウを混ぜ合わせます。",
                "フライパンにバターを熱し、卵液を流し込み、大きくかき混ぜながら形を整えて焼き上げます。"
            ]
        },
        {
            name: "豚しゃぶサラダ",
            keywords: ["豚肉", "レタス", "キャベツ", "きゅうり"],
            ingredients: [
                { name: "豚薄切り肉（ロースやバラ）", amount: "150g" },
                { name: "お好みの生野菜", amount: "適量" },
                { name: "酒（茹でる用）", amount: "大さじ1" },
                { name: "ポン酢またはゴマドレ", amount: "お好みで" }
            ],
            steps: [
                "鍋にお湯を沸かして酒を加え、弱火にして豚肉を1枚ずつ広げながらサッと茹でます。",
                "お肉の色が変わったらお皿（または冷水）に上げ、水気をしっかり切ります。",
                "器に食べやすく切った野菜を敷き、その上に豚肉をのせて、ドレッシングをかけます。"
            ]
        }
    ];

    // 2. レシピ提案のメイン処理
    function suggestRecipes() {
        const inputElement = document.getElementById('ingredientsInput');
        const resultSection = document.getElementById('resultSection');
        const recipeList = document.getElementById('recipeList');

        const inputText = inputElement.value.trim();
        if (!inputText) {
            alert('食材を入力してください！');
            return;
        }

        const inputIngredients = inputText.split(/[\s,、\s]+/).filter(item => item !== "");

        const matchedRecipes = recipeDatabase.filter(recipe => {
            return inputIngredients.some(inputIng => {
                return recipe.keywords.some(keyword => keyword.includes(inputIng) || inputIng.includes(keyword));
            });
        });

        recipeList.innerHTML = '';
        resultSection.style.display = 'block';

        if (matchedRecipes.length === 0) {
            recipeList.innerHTML = '<p class="no-result">該当するレシピが見つかりませんでした。他の食材を試してみてください！</p>';
        } else {
            matchedRecipes.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';

                // 材料と分量のリストを生成
                const ingredientsHtml = recipe.ingredients.map(ing => `
                    <li>
                        <span class="ing-name">${ing.name}</span>
                        <span class="ing-amount">${ing.amount}</span>
                    </li>
                `).join('');

                // 作り方のリストを生成
                const stepsHtml = recipe.steps.map(step => `<li>${step}</li>`).join('');

                card.innerHTML = `
                    <div class="recipe-name">✨ ${recipe.name}</div>
                    <div class="recipe-ingredients-title">【材料】(2人分)</div>
                    <ul class="recipe-ingredients-list">${ingredientsHtml}</ul>
                    <div class="recipe-steps-title">【作り方】</div>
                    <ol class="recipe-steps">${stepsHtml}</ol>
                `;
                recipeList.appendChild(card);
            });
        }
    }
</script>

</body>
</html>
